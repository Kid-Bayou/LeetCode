name: Sync LeetCode Submissions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install LeetCode CLI
        run: npm install -g leetcode-cli
        
      - name: Login to LeetCode
        run: leetcode user -l --cookie "${{ secrets.LEETCODE_COOKIE }}"
        
      - name: Sync and Push
        run: |
          # Configure git
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          
          # Fetch all history and branches
          git fetch origin
          
          # Reset to match remote branch exactly
          git reset --hard origin/main
          
          # Get submissions
          leetcode submission -a > submissions.txt
          
          # Stage changes
          git add submissions.txt
          
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Synced LeetCode solutions"
            git push origin main
          fi
