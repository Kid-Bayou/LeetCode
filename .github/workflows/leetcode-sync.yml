name: Sync LeetCode Submissions

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight
  workflow_dispatch:      # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install LeetCode CLI
        run: npm install -g leetcode-cli
        
      - name: Login to LeetCode
        run: leetcode user -l --cookie "${{ secrets.LEETCODE_COOKIE }}"
        
      - name: Fetch and save submissions
        run: |
          git pull origin main
          leetcode submission -a > submissions.txt
          
      - name: Commit and push changes
        run: |
          git config --local user.name "${{ github.actor }}"
          git config --local user.email "${{ github.actor }}@users.noreply.github.com"
          
          git add submissions.txt
          
          if git diff --staged --quiet; then
            echo "No new submissions to sync"
          else
            git commit -m "🔄 Synced LeetCode submissions"
            git push
          fi
