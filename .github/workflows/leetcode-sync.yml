name: Sync LeetCode Solutions

on:
  schedule:
    - cron: '0 * * * *'  # Runs every hour
  workflow_dispatch:  # Allows manual triggering

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install LeetCode Sync Tool
        run: pip install git+https://github.com/joshcai/leetcode-sync.git

      - name: Sync LeetCode Solutions
        run: |
          leetcode-sync --cookie "${{ secrets.LEETCODE_COOKIE }}" --repo .
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-sync LeetCode solutions $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push
