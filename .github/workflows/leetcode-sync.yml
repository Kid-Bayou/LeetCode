name: Sync LeetCode Submissions

on:
  schedule:
    - cron: "0 0 * * *"  # Runs at midnight every day
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install LeetCode CLI
        run: npm install -g leetcode-cli
        
      - name: Login to LeetCode
        run: leetcode user -l --cookie "${{ secrets.LEETCODE_COOKIE }}"
        
      - name: Fetch latest submissions
        run: leetcode submission -a > submissions.txt
        
      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull the latest changes
          git pull origin main --rebase
          
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Updated LeetCode solutions [Automated]"
            git push origin main
          fi
