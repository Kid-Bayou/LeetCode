name: Sync LeetCode Submissions

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:  

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 
          persist-credentials: false 
          
      - name: Configure Git
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          
      - name: Install LeetCode CLI
        run: npm install -g leetcode-cli
        
      - name: Login to LeetCode
        run: leetcode user -l --cookie "${{ secrets.LEETCODE_COOKIE }}"
        
      - name: Create Solutions Directory
        run: mkdir -p leetcode_solutions
        
      - name: Fetch latest submissions
        run: |
          cd leetcode_solutions
          leetcode submission -a > submissions.txt
          
      - name: Push to GitHub
        run: |
          git pull origin main --rebase || true
          git add leetcode_solutions/
          
          if git diff --cached --quiet; then
            echo "No new solutions to sync"
          else
            git commit -m "Synced LeetCode submissions"
            git remote set-url origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push origin main
          fi
